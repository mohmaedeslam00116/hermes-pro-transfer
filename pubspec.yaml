name: hermes_pro
description: "Hermes - Professional local file transfer over LAN"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  provider: ^6.1.2
  
  # Network & HTTP
  dio: ^5.4.0
  
  # File handling
  file_picker: ^8.0.0
  path_provider: ^2.1.3
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Network info
  network_info_plus: ^6.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
  
  # Local storage
  shared_preferences: ^2.2.3
  
  # WebRTC
  flutter_webrtc: ^0.11.0
  
  # UUID for unique sessions
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true