name: Flutter CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Flutter Analyze
        run: |
          cd hermes_pro
          flutter analyze

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Run Tests
        run: |
          cd hermes_pro
          flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Build Debug APK
        run: |
          cd hermes_pro
          flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Build Release APK
        run: |
          cd hermes_pro
          flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-release-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-release.apk

  upload-to-release:
    name: Upload APK to Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: hermes-release-apk
          path: ./apk

      - name: Get Release ID
        id: get-release
        run: |
          # Get the latest release ID
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload to Release
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@./apk/app-release.apk" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get-release.outputs.RELEASE_ID }}/assets?name=hermes-release.apk&label=Hermes-Release-APK"
