name: Flutter CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Flutter Analyze
        run: |
          cd hermes_pro
          flutter analyze

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Build Debug APK
        run: |
          cd hermes_pro
          flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Build Release APK
        run: |
          cd hermes_pro
          flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-release-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: hermes-release-apk
          path: ./apk

      - name: Download Release Notes
        run: |
          cp hermes_pro/RELEASE_NOTES.md ./RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: apk/*.apk
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-debug:
    name: Release Debug APK
    runs-on: ubuntu-latest
    needs: build-debug
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: hermes-debug-apk
          path: ./apk

      - name: Download Release Notes
        run: |
          cp hermes_pro/RELEASE_NOTES.md ./RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: apk/*.apk
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
