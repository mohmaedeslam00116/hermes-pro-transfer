name: Flutter CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Flutter Analyze
        run: |
          cd hermes_pro
          flutter analyze

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Run Tests
        run: |
          cd hermes_pro
          flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Build Debug APK
        run: |
          cd hermes_pro
          flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'

      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get

      - name: Build Release APK
        run: |
          cd hermes_pro
          flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-release-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Hermes Pro ${{ github.ref }}
          draft: false
          prerelease: true

      - name: Upload Release Asset
        if: github.event_name == 'push'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: hermes_pro/build/app/outputs/flutter-apk/app-release.apk
          asset_name: hermes-${{ github.ref }}-release.apk
          asset_content_type: application/vnd.android.aria
