name: Flutter CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'
      
      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get
      
      - name: Flutter Analyze
        run: |
          cd hermes_pro
          flutter analyze

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'
      
      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get
      
      - name: Build Debug APK
        run: |
          cd hermes_pro
          flutter build apk --debug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: 'hermes_pro/pubspec.lock'
      
      - name: Get dependencies
        run: |
          cd hermes_pro
          flutter pub get
      
      - name: Build Release APK
        run: |
          cd hermes_pro
          flutter build apk --release
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-release-apk
          path: hermes_pro/build/app/outputs/flutter-apk/app-release.apk